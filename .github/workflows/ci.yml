name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "packages/**/*.{ts,js,css,html}"

      - name: Run ESLint checks
        run: npm run lint

      - name: Compile TypeScript
        run: npm run build

      - name: Run unit tests
        run: npm test

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SERVER_HOOK: ${{ secrets.RENDER_SERVER_DEPLOY_HOOK_URL }}
      CLIENT_HOOK: ${{ secrets.RENDER_CLIENT_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Server Deploy
        if: env.SERVER_HOOK != ''
        run: curl -s -X POST "$SERVER_HOOK"
      - name: Trigger Client Deploy
        if: env.CLIENT_HOOK != ''
        run: curl -s -X POST "$CLIENT_HOOK"


