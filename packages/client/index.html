<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agar-Vibe | Real-Time Multiplayer .io Game</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Game Viewport Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Interactive UI Layer -->
    <div class="ui-overlay">
      <!-- Lobby Molecule Card -->
      <div id="lobby" class="lobby-card">
        <h1>Agar.Vibe</h1>
        <input
          type="text"
          id="nickname-input"
          placeholder="ENTER NICKNAME"
          maxlength="15"
          autofocus
        />
        <button id="play-button">Play Game</button>
      </div>

      <!-- Score HUD Molecule Badge -->
      <div id="hud" class="score-hud">Score: <span id="score-val">0</span></div>
    </div>

    <!-- Main Entry Module -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
