<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agar-Vibe | Real-Time Multiplayer .io Game</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Game Viewport Canvas -->
    <canvas id="game-canvas" role="img" aria-label="Agar.io game arena"></canvas>

    <!-- Interactive UI Layer -->
    <div class="ui-overlay">
      <!-- Lobby Molecule Card -->
      <div id="lobby" class="lobby-card">
        <h1>Agar.Vibe</h1>
        <input
          type="text"
          id="nickname-input"
          placeholder="ENTER NICKNAME"
          maxlength="15"
          aria-label="Nickname"
          autofocus
        />
        <div class="lobby-actions">
          <button id="play-button">Play Game</button>
          <button id="spectate-button" class="btn-secondary">Spectate</button>
        </div>
      </div>

      <!-- Score HUD Molecule Badge -->
      <div id="hud" class="score-hud">Score: <span id="score-val">0</span></div>

      <!-- Leaderboard HUD Molecule Panel -->
      <div id="leaderboard" class="leaderboard-card">
        <h3>Leaderboard</h3>
        <ol id="leaderboard-list"></ol>
      </div>

      <!-- Spectator HUD Overlay -->
      <div id="spectate-hud" class="spectate-hud">
        <button id="prev-spectate-button" class="btn-secondary" aria-label="Previous Player">◀</button>
        <div class="spectate-target">Spectating:<span id="spectate-name">None</span></div>
        <button id="next-spectate-button" class="btn-secondary" aria-label="Next Player">▶</button>
        <button id="exit-spectate-button" class="btn-secondary">Exit Spectate</button>
      </div>
    </div>

    <!-- Main Entry Module -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
